<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Velvet Crumbs | Premium Cakes</title>
<link rel="icon" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#fff7f9;color:#333}

header{
  position:sticky;top:0;z-index:1000;
  background:linear-gradient(90deg,#ff6f91,#ff8fab);
  padding:15px 30px;color:#fff;
  display:flex;justify-content:space-between;align-items:center
}
header h1{font-size:20px}
nav a{color:#fff;margin:0 10px;text-decoration:none;font-weight:500}
nav a:hover{opacity:.7}

.hero{
  height:80vh;
  background:url('https://images.unsplash.com/photo-1559622214-f8a9850965bb') center/cover;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  color:#fff;text-align:center
}
.hero h2{font-size:40px;background:rgba(0,0,0,0.4);padding:10px 20px;border-radius:10px}
.hero p{margin:15px 0;background:rgba(0,0,0,0.3);padding:8px;border-radius:8px}
.hero button{
  padding:12px 25px;border:none;border-radius:25px;
  background:#ff6f91;color:#fff;font-size:16px;cursor:pointer
}
.hero button:hover{background:#ff4d6d}

.section{padding:60px 20px;text-align:center}
.section h2{margin-bottom:20px}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px
}
.card{
  background:#fff;border-radius:15px;overflow:hidden;
  box-shadow:0 10px 20px rgba(0,0,0,0.1);
  transition:.3s
}
.card:hover{transform:translateY(-5px)}
.card img{width:100%;height:200px;object-fit:cover}
.card p{padding:10px}

form{
  max-width:500px;
  margin:auto;
  background:#fff;
  padding:30px;
  border-radius:20px;
  box-shadow:0 15px 30px rgba(0,0,0,0.1);
}

.form-group{
  margin-bottom:15px;
  text-align:left;
}

.form-group label{
  display:block;
  margin-bottom:5px;
  font-weight:500;
}

form input,form select,form textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
  transition:0.2s;
}

form input:focus,form select:focus,form textarea:focus{
  border-color:#ff6f91;
  outline:none;
  box-shadow:0 0 5px rgba(255,111,145,0.5);
}
form input,form select,form textarea{
  width:100%;padding:10px;margin:10px 0;
  border:1px solid #ddd;border-radius:8px
}
button.submit{
  width:100%;background:#ff6f91;color:#fff;
  border:none;padding:12px;border-radius:25px;
  font-size:16px;cursor:pointer
}
button.submit:hover{background:#ff4d6d}

footer{
  background:#111;color:#fff;text-align:center;
  padding:15px;margin-top:40px
}

.whatsapp-float{
  position:fixed;bottom:20px;right:20px;
  background:#25D366;color:#fff;padding:15px;
  border-radius:50%;font-size:20px;text-decoration:none
}
</style></head><body><header>
  <div style="display:flex;align-items:center;gap:10px;">
    
    <h1>VELVET CRUMBS 🎂</h1>
  </div>
  <nav>
    <a href="#home">Home</a>
    <a href="#gallery">Gallery</a>
    <a href="#order">Order</a>
    <a href="#contact">Contact</a>
  </nav>
</header><section class="hero" id="home">
  <h2>Luxury Custom Cakes</h2>
  <p>BANDARAWELA</p>
  <button onclick="document.getElementById('order').scrollIntoView()">Order Now</button>
</section><section class="section" id="gallery">
  <h2>Our Creations</h2>
  <div class="grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1603532648955-039310d9ed75">
      <p>Birthday Cake</p>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1535254973040-607b474cb50d">
      <p>Wedding Cake</p>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b">
      <p>Custom Design</p>
    </div>
  </div>
</section><section class="section" id="order">
  <h2>Place Your Order</h2>
  <form onsubmit="sendToWhatsApp(); return false;">  <div class="form-group">
    <label>Your Name</label>
    <input type="text" id="name" required>
  </div>  <div class="form-group">
    <label>Phone Number</label>
    <input type="tel" id="phone" required>
  </div>  <div class="form-group">
    <label>Cake Type</label>
    <select id="type" required>
      <option value="">Select</option>
      <option>Birthday</option>
      <option>Wedding</option>
      <option>Custom</option>
    </select>
  </div>  <div class="form-group">
    <label>Cake Size</label>
    <input type="text" id="size" placeholder="1kg, 2kg" required>
  </div>  <div class="form-group">
    <label>Flavor</label>
    <input type="text" id="flavor" required>
  </div>  <div class="form-group">
    <label>Delivery Date</label>
    <input type="date" id="date" required>
  </div>  <div class="form-group">
    <label>Delivery Needed?</label>
    <select id="delivery">
      <option value="">Select</option>
      <option>Yes</option>
      <option>No</option>
    </select>
  </div>  <div class="form-group">
    <label>Message on Cake</label>
    <textarea id="message" required></textarea>
  </div>  <p id="price" style="margin:10px 0;font-weight:bold;"></p><button class="submit">Send via WhatsApp</button>

</form>
</section><section class="section" id="contact">
  <h2>Contact</h2>
  <p>📞 0776128700</p>
  <p>Kandy | Gampola Area</p>
</section><footer>
  <p>© 2026 Velvet Crumbs Cakes</p>
  <p style="font-size:13px; opacity:0.8;">Design by Tech X @ VERTEX BETA</p>
  <p style="font-size:13px; opacity:0.8;">Proudly presented by VERTEX GROUP</p>
  <img src="main2.jpeg" alt="Vertex Logo" style="height:30px; margin-top:10px;">
</footer><a class="whatsapp-float" href="https://wa.me/94776128700" target="_blank">💬</a>

<script>
function sendToWhatsApp(){
  var name=document.getElementById('name').value;
  var phone=document.getElementById('phone').value;
  var type=document.getElementById('type').value;
  var size=document.getElementById('size').value;
  var flavor=document.getElementById('flavor').value;
  var date=document.getElementById('date').value;
  var message=document.getElementById('message').value;

  var number="94776128700";

  var text="*New Cake Order*%0A%0A"
  +"Name: "+name+"%0A"
  +"Phone: "+phone+"%0A"
  +"Type: "+type+"%0A"
  +"Size: "+size+"%0A"
  +"Flavor: "+flavor+"%0A"
  +"Date: "+date+"%0A"
  +"Message: "+message;

  window.open("https://wa.me/"+number+"?text="+text,'_blank');
}
</script><!-- PRO FEATURES SCRIPT --><script>
// Auto price calculation
function calculatePrice(){
  var size=document.getElementById('size').value;
  var base=0;
  if(size.includes('1')) base=4000;
  else if(size.includes('2')) base=7500;
  else base=5000;

  var delivery=document.getElementById('delivery').value;
  var deliveryCost = delivery === 'Yes' ? 500 : 0;

  document.getElementById('price').innerText = "Estimated Price: Rs. " + (base + deliveryCost);
}

// Send to WhatsApp with all details
function sendToWhatsApp(){
  var name=document.getElementById('name').value;
  var phone=document.getElementById('phone').value;
  var type=document.getElementById('type').value;
  var size=document.getElementById('size').value;
  var flavor=document.getElementById('flavor').value;
  var date=document.getElementById('date').value;
  var message=document.getElementById('message').value;
  var delivery=document.getElementById('delivery').value;

  var number="94776128700";

  var text="*New Premium Cake Order*%0A%0A"
  +"Name: "+name+"%0A"
  +"Phone: "+phone+"%0A"
  +"Type: "+type+"%0A"
  +"Size: "+size+"%0A"
  +"Flavor: "+flavor+"%0A"
  +"Date: "+date+"%0A"
  +"Delivery: "+delivery+"%0A"
  +"Message: "+message;

  window.open("https://wa.me/"+number+"?text="+text,'_blank');
}
</script><!-- ADDITIONAL ORDER OPTIONS --><script>
document.addEventListener('DOMContentLoaded', function(){
  const form=document.querySelector('form');

  // Add delivery option
  const deliverySelect=document.createElement('select');
  deliverySelect.id='delivery';
  deliverySelect.innerHTML=`
    <option value="">Delivery Needed?</option>
    <option>Yes</option>
    <option>No</option>
  `;
  form.insertBefore(deliverySelect, document.querySelector('#message'));

  // Price display
  const price=document.createElement('p');
  price.id='price';
  price.style.fontWeight='bold';
  form.appendChild(price);

  // Event listeners
  document.getElementById('size').addEventListener('input', calculatePrice);
  deliverySelect.addEventListener('change', calculatePrice);
});
</script></body>
</html>
